<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHADOW GAME SHOP</title>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: #f0f0f0;
            line-height: 1.6;
        }
        header { background-color: #333; color: #fff; padding: 1rem 0; text-align: center; border-bottom: 2px solid #555; }
        h1, h2, h3 { color: #00bfff; }
        main { padding: 20px; max-width: 1200px; margin: 20px auto; }
        .game-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .game-item { background-color: #2a2a2a; border: 1px solid #444; border-radius: 8px; padding: 15px; text-align: center; }
        .game-item img { max-width: 100%; height: auto; border-radius: 4px; }
        button { background-color: #007bff; color: white; padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        footer { background-color: #333; color: #fff; text-align: center; padding: 1rem 0; margin-top: 30px; }
    </style>
</head>
<body>

    <header>
        <h1>Welcome to SHADOW GAME SHOP</h1>
        <p>Your one-stop destination for the latest games!</p>
    </header>

    <main>
        <div class="game-grid">
            <div class="game-item">
                <h3>Epic Adventure Game</h3>
                <p>Price: $59.99</p>
                <button onclick="buyGame('Epic Adventure')">Add to Cart</button>
            </div>
            <div class="game-item">
                <h3>Space Shooter Pro</h3>
                <p>Price: $49.99</p>
                <button onclick="buyGame('Space Shooter')">Add to Cart</button>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 SHADOW GAME SHOP</p>
    </footer>

    <script>
        function buyGame(gameName) {
            alert("You have added " + gameName + " to your cart!");
        }
        console.log("Welcome to SHADOW GAME SHOP!");
    </script>

</body>
</html>
