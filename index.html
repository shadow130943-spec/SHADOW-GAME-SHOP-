<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHADOW GAME SHOP</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; margin: 0; padding-bottom: 60px; }
        .page { display: none; padding: 20px; }
        .active { display: block; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #1f1f1f; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; }
        .game-card { background: #1e1e1e; padding: 15px; margin: 10px 0; border-radius: 10px; display: flex; align-items: center; }
        button { cursor: pointer; }
    </style>
</head>
<body>

    <div id="shop" class="page active">
        <h1>SHADOW SHOP</h1>
        <div id="game-list"></div>
    </div>

    <div id="message" class="page">
        <h1>Messages</h1>
        <p>No new messages.</p>
    </div>

    <div id="account" class="page">
        <h1>Account Info</h1>
        <div id="admin-info"></div>
    </div>

    <nav class="bottom-nav">
        <button onclick="showPage('shop')">Shop</button>
        <button onclick="showPage('message')">Message</button>
        <button onclick="showPage('account')">Account</button>
    </nav>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById(pageId).style.display = 'block';
        }
    </script>
</body>
</html>
